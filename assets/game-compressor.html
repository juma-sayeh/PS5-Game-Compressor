    function modalSizeText(bytes) {
      return shortSize(bytes).replace(/\.00 /, ' ');
    }

    function safeSpaceText(g) {
      if (state.compressDestination === 'usb') {
        const usb = selectedCompressUsb();
        if (usb) return 'Writes to ' + usb.name + '; original is removed after verification';
        return 'Writes to selected USB; original is removed after verification';
      }
      if (!g || g.sizePending || !Number(g.requiredBytes || 0)) {
        return 'Keeps the original until verified; needs measured source-size free';
      }
      const extra = Number(g.extraBytes || 0);
      const required = modalSizeText(g.requiredBytes || 0);
      return extra > 0
        ? 'Keeps the original until verified; needs ' + required + ' free (' + modalSizeText(extra) + ' more needed)'
        : 'Keeps the original until verified; needs ' + required + ' free';
    }

    function destructiveSpaceText(g) {
      if (state.compressDestination === 'usb') {
        return 'Not available when writing to USB';
      }
      const minFree = Number((g && g.streamMinFreeBytes) || 1073741824);
      if (!g || !g.canStreamDelete) return 'Not available for image-file compression';
      const extra = Number(g.streamExtraBytes || 0);
      const base = 'Deletes while writing; cannot cancel after start; needs ' +
        modalSizeText(minFree) + ' free';
      return extra > 0
        ? base + ' (' + modalSizeText(extra) + ' more needed)'
        : base;
    }

    function updateCompressModalSelection() {
      const g = state.compressGame;
      const movingToUsb = state.compressDestination === 'usb';
      const destructiveUnavailable = movingToUsb || !(g && g.canStreamDelete);
      if (destructiveUnavailable && state.compressDeletePolicy === 'stream') {
        state.compressDeletePolicy = 'after';
      }
      $('format-safe-space').textContent = safeSpaceText(g);
      $('format-stream-space').textContent = destructiveSpaceText(g);
      $('compress-usb-panel').classList.toggle('hidden', !movingToUsb);
      renderCompressUsbSelect();
      document.querySelectorAll('[data-compress-format], [data-compress-profile], [data-compress-policy], [data-compress-destination]').forEach((button) => {
        const format = button.getAttribute('data-compress-format');
        const profile = button.getAttribute('data-compress-profile');
        const policy = button.getAttribute('data-compress-policy');
        const destination = button.getAttribute('data-compress-destination');
        const selected = format
          ? format === state.compressFormat
          : (profile
              ? profile === state.compressProfile
              : (destination
                  ? destination === state.compressDestination
                  : policy === state.compressDeletePolicy));
        const disabled = policy === 'stream' && destructiveUnavailable;
        button.disabled = disabled;
        button.classList.toggle('is-disabled', disabled);
        button.classList.toggle('is-selected', selected && !disabled);
        const chip = button.querySelector('.chip');
        if (chip) {
          chip.textContent = disabled ? 'Unavailable' : (selected ? 'Selected' : 'Select');
          chip.classList.toggle('run', selected && !disabled);
          chip.classList.toggle('bad', disabled);
        }
      });
      $('format-start').disabled = !g || (movingToUsb && !state.compressUsbId);
    }

    function showCompressFormatModal(g) {
      state.compressGame = g;
      state.compressFormat = 'pfs';
      state.compressProfile = 'space';
      state.compressDeletePolicy = 'after';
      state.compressDestination = 'keep';
      state.compressUsbId = '';
      state.compressUsbLoading = false;
      $('format-title').textContent = 'Compress ' + (g.name || g.titleId);
      $('format-pfs-name').textContent = 'pfs_image.dat';
      $('format-exfat-name').textContent = (g.titleId || '<TITLE_ID>') + '.exfat';
      updateCompressModalSelection();
      $('format-modal').classList.remove('hidden');
      state.compressUsbLoading = true;
      updateCompressModalSelection();
      api('/api/gc/usb')
        .then((data) => {
          state.usb = data.usb || [];
          if (!selectedCompressUsb()) state.compressUsbId = state.usb[0] ? state.usb[0].id : '';
        })
        .catch(() => {
          state.usb = [];
          state.compressUsbId = '';
        })
        .finally(() => {
          state.compressUsbLoading = false;
          updateCompressModalSelection();
        });
    }

    function closeCompressFormatModal() {
      $('format-modal').classList.add('hidden');
      state.compressGame = null;
      state.compressDestination = 'keep';
      state.compressUsbId = '';
      state.compressUsbLoading = false;
      updateCompressModalSelection();
    }

    async function startMove(url) {
      try {
        await api(url, { method: 'POST' });
        closeUsbModal();
        await refreshAll();
      } catch (err) {
        const data = err.data || {};
        if (data.lowSpace) {
          alert('Not enough free storage.\n\nFree ' + shortSize(data.extraBytes || 0) + ' more on the target storage.');
        } else {
          alert(err.message);
        }
      }
    }

    async function startMoveToUsb(g, usbId) {
      if (!g || !usbId) return;
      await startMove('/api/gc/move-to-usb?titleId=' + encodeURIComponent(g.titleId) +
        '&usbId=' + encodeURIComponent(usbId));
    }

    async function startMoveToInternal(g) {
      if (!g) return;
      await startMove('/api/gc/move-to-internal?titleId=' + encodeURIComponent(g.titleId));
    }

    async function startSelectedCompress() {
      const g = state.compressGame;
      const format = state.compressFormat;
      const profile = state.compressProfile;
      const deletePolicy = state.compressDeletePolicy;
      const usbId = state.compressDestination === 'usb' ? state.compressUsbId : '';
      if (deletePolicy === 'stream' && (!g || !g.canStreamDelete)) {
        updateCompressModalSelection();
        return;
      }
      if (state.compressDestination === 'usb' && !usbId) {
        updateCompressModalSelection();
        return;
      }
      closeCompressFormatModal();
      if (!g || (format !== 'pfs' && format !== 'exfat')) return;
      await startAction(g, false, 'compress', format, deletePolicy, profile, usbId);
    }

    async function startAction(g, confirmStream, overrideAction, compressFormat, deletePolicy, compressionProfile, usbId) {
      const action = overrideAction || actionFor(g);
      if (!action) return;
      if (action === 'compress' && !compressFormat) {
        showCompressFormatModal(g);
        return;
      }
      let url = '';
	      if (action === 'compress') {
	        url = '/api/gc/compress?titleId=' + encodeURIComponent(g.titleId) +
	          '&format=' + encodeURIComponent(compressFormat);
	        if (deletePolicy) url += '&deletePolicy=' + encodeURIComponent(deletePolicy);
	        if (compressionProfile) url += '&profile=' + encodeURIComponent(compressionProfile);
	        if (usbId) url += '&usbId=' + encodeURIComponent(usbId);
	      } else if (action === 'uncompress') {
	        url = '/api/gc/uncompress?titleId=' + encodeURIComponent(g.titleId);
	      } else if (action === 'validate-only') {
	        url = '/api/gc/validate-only?titleId=' + encodeURIComponent(g.titleId);
	      } else {
	        url = '/api/gc/validate-repair?titleId=' + encodeURIComponent(g.titleId);
	      }
      if (confirmStream) url += '&confirmStream=1';
      try {
        await api(url, { method: 'POST' });
        startPollBurst(6000);
        await refreshAll();
      } catch (err) {
        const data = err.data || {};
        if (data.lowSpace) {
          const requested = deletePolicy || data.requestedDeletePolicy || '';
          if (requested === 'stream') {
            const minFree = modalSizeText(data.streamMinFreeBytes || 1073741824);
            const extra = modalSizeText(data.streamExtraBytes || 0);
            alert('Not enough free storage for destructive compression.\n\nDestructive deletes the source while writing and cannot be cancelled after it starts. It requires ' + minFree + ' free. Free ' + extra + ' more on the target storage.');
            return;
          }
          if (requested === 'after') {
            const required = modalSizeText(data.requiredBytes || 0);
            const extra = modalSizeText(data.extraBytes || 0);
            alert('Not enough free storage for safe compression.\n\nSafe keeps the original until the new file is complete and verified. It requires ' + required + ' free. Free ' + extra + ' more on the target storage.');
            return;
          }
          const extra = shortSize(data.extraBytes || 0);
          const base = 'Free ' + extra + ' more to keep the original untouched until the new file is complete.';
          if (data.canStreamDelete) {
            const msg = 'Not enough free storage for the safer path.\n\nDelete while processing can damage the original source if the operation stops.\n\n' + base;
            if (confirm(msg)) {
              await startAction(g, true, overrideAction, compressFormat, deletePolicy, compressionProfile, usbId);
              return;
            }
          } else {
            alert('Not enough free storage.\n\n' + base);
          }
        } else {
          alert(err.message);
        }
      }
    }

    async function cancelPending(id) {
      await api('/api/gc/queue/cancel?id=' + encodeURIComponent(id), { method: 'POST' }).catch((err) => alert(err.message));
      await refreshAll();
    }

    async function cancelActiveJob() {
      await api('/api/gc/job/cancel', { method: 'POST' })
        .catch((err) => alert(err.message));
      startPollBurst(8000);
      await refreshAll();
    }

    document.addEventListener('DOMContentLoaded', () => {
      restoreSelectedGame();
      $('info-top').innerHTML = icon('info');
      $('history-top').innerHTML = icon('history');
      $('info-close').innerHTML = icon('close');
      $('history-close').innerHTML = icon('close');
      $('usb-close').innerHTML = icon('close');
      $('format-close').innerHTML = icon('close');

      $('info-top').addEventListener('click', () => $('info-modal').classList.remove('hidden'));
      $('info-close').addEventListener('click', () => $('info-modal').classList.add('hidden'));
      $('history-top').addEventListener('click', () => $('history-modal').classList.remove('hidden'));
      $('history-close').addEventListener('click', () => $('history-modal').classList.add('hidden'));
      $('usb-close').addEventListener('click', closeUsbModal);
      $('format-close').addEventListener('click', closeCompressFormatModal);
      document.querySelectorAll('[data-compress-format]').forEach((button) => {
        button.addEventListener('click', () => {
          state.compressFormat = button.getAttribute('data-compress-format') || 'pfs';
          updateCompressModalSelection();
        });
      });
      document.querySelectorAll('[data-compress-profile]').forEach((button) => {
        button.addEventListener('click', () => {
          state.compressProfile = button.getAttribute('data-compress-profile') || 'space';
          updateCompressModalSelection();
        });
      });
      document.querySelectorAll('[data-compress-policy]').forEach((button) => {
        button.addEventListener('click', () => {
          if (button.disabled) return;
          state.compressDeletePolicy = button.getAttribute('data-compress-policy') || 'after';
          updateCompressModalSelection();
        });
      });
      document.querySelectorAll('[data-compress-destination]').forEach((button) => {
        button.addEventListener('click', () => {
          state.compressDestination = button.getAttribute('data-compress-destination') || 'keep';
          if (state.compressDestination === 'usb' && !state.compressUsbId && state.usb[0]) {
            state.compressUsbId = state.usb[0].id || '';
          }
          updateCompressModalSelection();
        });
      });
      $('compress-usb-select').addEventListener('change', (event) => {
        state.compressUsbId = event.target.value || '';
        updateCompressModalSelection();
      });
      $('format-start').addEventListener('click', startSelectedCompress);
      document.querySelectorAll('.modal-backdrop').forEach((modal) => {
        modal.addEventListener('click', (event) => {
          if (event.target !== modal) return;
          if (modal.id === 'usb-modal') closeUsbModal();
          else if (modal.id === 'format-modal') closeCompressFormatModal();
          else modal.classList.add('hidden');
        });
      });
      document.addEventListener('click', (event) => {
        if (!state.secondaryMenuFor) return;
        if (event.target.closest('.action-row')) return;
        closeSecondaryMenu();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeSecondaryMenu();
      });
      window.addEventListener('resize', () => {
        if (state.secondaryMenuFor) positionSecondaryMenu();
      });

      refreshAll();
      setInterval(refreshJob, 1200);
      setInterval(refreshAll, 10000);
    });
  </script>
</body>
</html>
